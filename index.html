<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lossless URL Compressor — piss.zip</title>
    <meta name="description" content="piss.zip compresses URLs into deterministic, lossless, stateless short links." />
    <meta property="og:title" content="piss.zip — Lossless URL Compressor" />
    <meta property="og:description" content="Compress URLs into deterministic, lossless, stateless short links." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://piss.zip/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="piss.zip — Lossless URL Compressor" />
    <meta name="twitter:description" content="Compress URLs into deterministic, lossless, stateless short links." />
  </head>
  <body>
    <main>
      <h1>Lossless URL Compressor</h1>
      <p>A URL-aware LZ-style encoder: it tokenizes common URL structure with a dictionary derived from Common Crawl indexes, packs numbers/dates/IDs, then back-references repeated text.</p>
      <p>Inspired by <a href="https://x.com/yanorei32/status/2059594850694283362">yanorei32</a>. <a href="https://github.com/mia-riezebos/lossless-url-compressor">GitHub</a>.</p>
      <p id="views" aria-live="polite">visits, last 7 days: loading…</p>

      <label>
        Input URL <a id="input-visit" href="https://youtube.com/watch?v=dQw4w9WgXcQ">(visit)</a>
        <textarea id="input" rows="4" spellcheck="false" placeholder="https://youtube.com/watch?v=dQw4w9WgXcQ"></textarea>
      </label>

      <div class="options">
        <label>Version <select id="codec-version"><option value="1">v1</option></select></label>
        <label title="Keeps the compressed payload after # so it is decoded locally and never sent to the server."><input id="allow-fragment" type="checkbox" /> Fragment</label>
        <label title="CJK Unicode in URLs is not strictly RFC-supported, but browsers normalize it and percent-escape it on the wire."><input id="use-cjk-payload" type="checkbox" checked /> CJK (extended charset)</label>
      </div>

      <label>
        Compressed URL <a id="output-visit" href="#">(visit)</a>
        <textarea id="output" rows="4" spellcheck="false"></textarea>
      </label>

      <p id="stats"></p>
      <p id="error" role="alert"></p>

      <p class="footer-links"><a href="mailto:abuse@mia.cx?subject=piss.zip%20abuse%20report&body=Please%20include%20the%20piss.zip%20URL%2C%20the%20destination%20URL%20if%20known%2C%20and%20why%20it%20is%20abusive.">report abuse</a> · <a id="bookmarklet" href="javascript:location.href='https://piss.zip/?url='+encodeURIComponent(location.href)">bookmarklet</a></p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
