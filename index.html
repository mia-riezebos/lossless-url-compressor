<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lossless URL Compressor</title>
  </head>
  <body>
    <main>
      <h1>Lossless URL Compressor</h1>
      <p>Compresses URLs with a trained URL dictionary, numeric/date packing, and repeated-text references. Decoding is stateless and redirects directly to the original URL.</p>

      <label>
        Input URL
        <textarea id="input" rows="4" spellcheck="false" placeholder="https://x.com/yanorei32/status/2059594850694283362"></textarea>
      </label>

      <div class="options">
        <label><input id="allow-fragment" type="checkbox" /> Fragment</label>
        <label><input id="use-cjk-payload" type="checkbox" /> CJK</label>
      </div>

      <label>
        Compressed URL
        <textarea id="output" rows="4" spellcheck="false"></textarea>
      </label>

      <p id="stats"></p>
      <p id="error" role="alert"></p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
