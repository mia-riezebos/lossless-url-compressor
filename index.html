<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lossless URL Compressor</title>
  </head>
  <body>
    <main>
      <h1>Lossless URL Compressor</h1>
      <p>A URL-aware LZ-style encoder: it tokenizes common URL structure with a dictionary trained on Common Crawl indexes, packs numbers/dates/IDs, then back-references repeated text.</p>

      <label>
        Input URL
        <textarea id="input" rows="4" spellcheck="false" placeholder="https://x.com/yanorei32/status/2059594850694283362"></textarea>
      </label>

      <div class="options">
        <label><input id="allow-fragment" type="checkbox" /> Fragment</label>
        <label title="CJK Unicode in URLs is not strictly RFC-supported, but browsers normalize it and percent-escape it on the wire."><input id="use-cjk-payload" type="checkbox" checked /> CJK (extended charset)</label>
      </div>

      <label>
        Compressed URL
        <textarea id="output" rows="4" spellcheck="false"></textarea>
      </label>

      <p id="stats"></p>
      <p id="error" role="alert"></p>
    </main>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
